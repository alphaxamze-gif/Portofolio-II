<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio II</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <a href="#" class="logo">
            <i class="fa-solid fa-code"></i>
            <span class="logo-text">Hamza Abdullahi</span>
        </a>

        <nav>
            <div class="menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </div>

            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#contacts">Contacts </a></li>

            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="content">
            <h1>Hamza Abdullahi</h1>
            <h2>Junior <span class="typing-text">Frontend Developer</span></h2>
            <p>
                Lorem ipsum dolor sit amet, consectetur adipisicing elit. Quisquam cupiditate aliquid ullam enim
                expedita recusandae velit ad quae, obcaecati nihil.
            </p>

            <div class="cta-button">
                <a href="#projects" class="btn btn-primary">
                    <i class="fa-solid fa-code"></i> View Projects
                </a>

                <a href="#contact" class="btn btn-secondary">
                    <i class="fa-solid fa-paper-plane"></i> Contact Me
                </a>
            </div>

        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-dribble"></i></a>
            </div>
        </div>

        <div class="profile-cotainer">
            <div class="border-outer"></div>
            <div class="border-middle"></div>
            <div class="border-inner"></div>
            <div class="border-container"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <img src="./profile image.jpg" width="240px" alt="profile pictures" class="profile-img">
        </div>
    </section>

    <script src="script.js"></script>

</body>

</html>
